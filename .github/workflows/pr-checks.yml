name: Pull Request Checks

on:
  pull_request:
    branches:
      - master
      - qa

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify CODEOWNERS exists
        run: test -f .github/CODEOWNERS

      - name: Verify playbook structure
        run: |
          test -d playbook/governance
          test -d playbook/standards
          test -d playbook/workflows
          test -f playbook/governance/00-operating-model.md
          test -f playbook/standards/00-project-context.md

      - name: Check for accidentally committed secrets or binaries
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -Ei '\.(docx|pptx|xlsx|pdf|env)$'; then
            echo "ERROR: Binary or sensitive file detected in PR. Remove it before merging."
            exit 1
          fi

  build-site:
    name: Build Docusaurus site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build site
        run: npm run build
        working-directory: website
